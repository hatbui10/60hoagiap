<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>60 Hoa Giáp - Ngũ Hành Sinh Khắc</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #f0ad4e;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --male: #58a6ff;
            --female: #f85149;
            --sinh: #238636;
            --khac: #da3633;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 100px;
        }

        header {
            background: var(--card-bg);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0; z-index: 100;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .year-info { font-weight: bold; font-size: 1.2rem; }
        .can-chi { color: var(--accent); }

        .nap-am-box {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 6px;
        }

        .relationship {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }

        .rel-item {
            padding: 5px 8px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }
        .rel-item.sinh { border: 1px solid var(--sinh); color: #4ade80; }
        .rel-item.khac { border: 1px solid var(--khac); color: #f87171; }
        .rel-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }

        .cung-phi {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .cung {
            flex: 1;
            font-size: 0.85rem;
            padding: 6px;
            text-align: center;
            border-radius: 6px;
            background: #21262d;
        }
        .cung.m { color: var(--male); border: 1px solid var(--male); }
        .cung.f { color: var(--female); border: 1px solid var(--female); }

        textarea {
            width: 100%;
            height: 80px;
            background: #0d1117;
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            width: 100%; max-width: 300px;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size:1rem;">60 HOA GIÁP & SINH KHẮC (1960-2019)</h1>
</header>

<div class="container" id="app"></div>

<div class="footer">
    <button class="btn" onclick="exportTxt()">XUẤT FILE GHI CHÚ (.TXT)</button>
</div>

<script>
    const cans = ["Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ", "Canh", "Tân", "Nhâm", "Quý"];
    const chis = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
    
    const napAmData = {
        "Canh Tý": "Bích Thượng Thổ", "Tân Sửu": "Bích Thượng Thổ", "Nhâm Dần": "Kim Bạch Kim", "Quý Mão": "Kim Bạch Kim",
        "Giáp Thìn": "Phú Đăng Hỏa", "Ất Tỵ": "Phú Đăng Hỏa", "Bính Ngọ": "Thiên Hà Thủy", "Đinh Mùi": "Thiên Hà Thủy",
        "Mậu Thân": "Đại Trạch Thổ", "Kỷ Dậu": "Đại Trạch Thổ", "Canh Tuất": "Thoa Xuyến Kim", "Tân Hợi": "Thoa Xuyến Kim",
        "Nhâm Tý": "Tang Đố Mộc", "Quý Sửu": "Tang Đố Mộc", "Giáp Dần": "Đại Khê Thủy", "Ất Mão": "Đại Khê Thủy",
        "Bính Thìn": "Sa Trung Thổ", "Đinh Tỵ": "Sa Trung Thổ", "Mậu Ngọ": "Thiên Thượng Hỏa", "Kỷ Mùi": "Thiên Thượng Hỏa",
        "Canh Thân": "Thạch Lựu Mộc", "Tân Dậu": "Thạch Lựu Mộc", "Nhâm Tuất": "Đại Hải Thủy", "Quý Hợi": "Đại Hải Thủy",
        "Giáp Tý": "Hải Trung Kim", "Ất Sửu": "Hải Trung Kim", "Bính Dần": "Lư Trung Hỏa", "Đinh Mão": "Lư Trung Hỏa",
        "Mậu Thìn": "Đại Lâm Mộc", "Kỷ Tỵ": "Đại Lâm Mộc", "Canh Ngọ": "Lộ Bàng Thổ", "Tân Mùi": "Lộ Bàng Thổ",
        "Nhâm Thân": "Kiếm Phong Kim", "Quý Dậu": "Kiếm Phong Kim", "Giáp Tuất": "Sơn Đầu Hỏa", "Ất Hợi": "Sơn Đầu Hỏa",
        "Bính Tý": "Giản Hạ Thủy", "Đinh Sửu": "Giản Hạ Thủy", "Mậu Dần": "Thành Đầu Thổ", "Kỷ Mão": "Thành Đầu Thổ",
        "Canh Thìn": "Bạch Lạp Kim", "Tân Tỵ": "Bạch Lạp Kim", "Nhâm Ngọ": "Dương Liễu Mộc", "Quý Mùi": "Dương Liễu Mộc",
        "Giáp Thân": "Tuyền Trung Thủy", "Ất Dậu": "Tuyền Trung Thủy", "Bính Tuất": "Ốc Thượng Thổ", "Đinh Hợi": "Ốc Thượng Thổ",
        "Mậu Tý": "Thích Lịch Hỏa", "Kỷ Sửu": "Thích Lịch Hỏa", "Canh Dần": "Tùng Bách Mộc", "Tân Mão": "Tùng Bách Mộc",
        "Nhâm Thìn": "Trường Lưu Thủy", "Quý Tỵ": "Trường Lưu Thủy", "Giáp Ngọ": "Sa Trung Kim", "Ất Mùi": "Sa Trung Kim",
        "Bính Thân": "Sơn Hạ Hỏa", "Đinh Dậu": "Sơn Hạ Hỏa", "Mậu Tuất": "Bình Địa Mộc", "Kỷ Hợi": "Bình Địa Mộc"
    };

    const sinhKhacMap = {
        "Kim": { sinh: "Thủy", duoc: "Thổ", khac: "Mộc", bi: "Hỏa" },
        "Mộc": { sinh: "Hỏa", duoc: "Thủy", khac: "Thổ", bi: "Kim" },
        "Thủy": { sinh: "Mộc", duoc: "Kim", khac: "Hỏa", bi: "Thổ" },
        "Hỏa": { sinh: "Thổ", duoc: "Mộc", khac: "Kim", bi: "Thủy" },
        "Thổ": { sinh: "Kim", duoc: "Hỏa", khac: "Thủy", bi: "Mộc" }
    };

    const cungPhi = [
        ["Tốn", "Khôn"], ["Chấn", "Chấn"], ["Khôn", "Tốn"], ["Khảm", "Cấn"], ["Ly", "Càn"], ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], 
        ["Chấn", "Chấn"], ["Khôn", "Tốn"], ["Khảm", "Cấn"], ["Ly", "Càn"], ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], ["Chấn", "Chấn"], 
        ["Khôn", "Tốn"], ["Khảm", "Cấn"], ["Ly", "Càn"], ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], ["Chấn", "Chấn"], ["Khôn", "Tốn"], 
        ["Khảm", "Cấn"], ["Ly", "Càn"], ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], ["Chấn", "Chấn"], ["Khôn", "Tốn"], ["Khảm", "Cấn"], 
        ["Ly", "Càn"], ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], ["Chấn", "Chấn"], ["Khôn", "Tốn"], ["Khảm", "Cấn"], ["Ly", "Càn"], 
        ["Cấn", "Đoài"], ["Đoài", "Cấn"], ["Càn", "Ly"], ["Khôn", "Khảm"], ["Tốn", "Khôn"], ["Chấn", "Chấn"], ["Khôn", "Tốn"], ["Khảm", "Cấn"], ["Ly", "Càn"], ["Cấn", "Đoài"]
    ];

    const app = document.getElementById('app');

    for (let i = 0; i < 60; i++) {
        let y = 1960 + i;
        let cIdx = (y - 4) % 10;
        let chiIdx = (y - 4) % 12;
        let name = cans[cIdx] + " " + chis[chiIdx];
        let napAm = napAmData[name];
        let hanh = napAm.split(' ').pop();
        let sk = sinhKhacMap[hanh];
        let [m, f] = cungPhi[i];
        let saved = localStorage.getItem(`hg_v3_${y}`) || "";

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <span class="year-info">${y} - <span class="can-chi">${name}</span></span>
                <span style="font-size:0.7rem; color:var(--text-dim)">#${i+1}</span>
            </div>
            <div class="nap-am-box"><b>Nạp âm:</b> ${napAm}</div>
            <div class="relationship">
                <div class="rel-item sinh">
                    <span class="rel-label">Tương sinh</span>
                    Hợp: ${sk.duoc}, ${sk.sinh}
                </div>
                <div class="rel-item khac">
                    <span class="rel-label">Tương khắc</span>
                    Kỵ: ${sk.bi}, ${sk.khac}
                </div>
            </div>
            <div class="cung-phi">
                <div class="cung m">Nam: ${m}</div>
                <div class="cung f">Nữ: ${f}</div>
            </div>
            <textarea placeholder="Ghi chú thêm..." oninput="localStorage.setItem('hg_v3_${y}', this.value)">${saved}</textarea>
        `;
        app.appendChild(card);
    }

    function exportTxt() {
        let text = "SỔ TAY PHONG THỦY 1960-2019 (SINH KHẮC HÀNH)\\n\\n";
        for (let i = 0; i < 60; i++) {
            let y = 1960 + i;
            let cIdx = (y - 4) % 10;
            let chiIdx = (y - 4) % 12;
            let name = cans[cIdx] + " " + chis[chiIdx];
            let napAm = napAmData[name];
            let hanh = napAm.split(' ').pop();
            let sk = sinhKhacMap[hanh];
            let [m, f] = cungPhi[i];
            let note = localStorage.getItem(`hg_v3_${y}`) || "";
            
            text += `Năm ${y} - ${name} (${napAm})\\n`;
            text += `- Tương sinh: ${sk.duoc} sinh ${hanh}, ${hanh} sinh ${sk.sinh}\\n`;
            text += `- Tương khắc: ${sk.bi} khắc ${hanh}, ${hanh} khắc ${sk.khac}\\n`;
            text += `- Cung Phi: Nam ${m}, Nữ ${f}\\n`;
            if(note) text += `- Ghi chú: ${note}\\n`;
            text += `------------------------------------\\n`;
        }
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "phong-thuy-sinh-khac-1960.txt";
        a.click();
    }
</script>
</body>
</html>
